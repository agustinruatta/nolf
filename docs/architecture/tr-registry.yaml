    revised: ""
    status: active
  - id: TR-PP-004
    system: post-process-stack
    gdd: design/gdd/post-process-stack.md
    requirement: "Glow disabled project-wide in WorldEnvironment (Art Bible 8J enforcement)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-PP-005
    system: post-process-stack
    gdd: design/gdd/post-process-stack.md
    requirement: "Forbidden post-process effects: bloom, chromatic aberration, SSR, motion blur, DoF, vignette, film grain, color-grading LUTs."
