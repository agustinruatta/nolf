    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-015
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Saves blocked during InputContext.CUTSCENE; permitted during active combat (guard state at save time is what loads)."
    created: 2026-04-22
    revised: ""
    status: active

