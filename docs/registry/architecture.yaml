# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - target_fps: 60
    total_frame_budget_ms: 16.6
    platform: PC
    adr: docs/architecture/adr-0001-stencil-id-contract.md
    notes: "Project-wide frame budget per Art Bible 8 / technical-preferences.md. First registered in ADR-0001 because it constrains the outline pass; future ADRs may reference."
    added: 2026-04-19
    revised: ""

  - system: outline-pipeline
    status: active
    budget_ms: 2.0
    adr: docs/architecture/adr-0001-stencil-id-contract.md
    notes: "Full-screen outline CompositorEffect. Target 0.8–1.5 ms on RTX 2060 at 1080p; up to 2.0 ms allowed on Iris Xe with 75% resolution scale (default-on for integrated graphics)."
    referenced_by:
      - docs/architecture/adr-0001-stencil-id-contract.md
    added: 2026-04-19
    revised: ""

