    revised: ""
    status: active
  - id: TR-CD-012
    system: combat-damage
    gdd: design/gdd/combat-damage.md
    requirement: "Rifle-only ADS: Aim input → FOV 85°→55° tween 200 ms ease-out; muzzle sway −50%; accuracy halved; cancels on reload/switch/damage ≥10 HP."
