    revised: ""
    status: active
  - id: TR-INP-002
    system: input
    gdd: design/gdd/input.md
    requirement: "29 InputMap actions (26 gameplay/UI + 3 debug) declared via InputActions static class as `const NAME := &\"name\"` StringName constants."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-INP-003
    system: input
    gdd: design/gdd/input.md
    requirement: "Movement actions polled via Input.get_vector() axis-based in _physics_process; Combat/Gadget actions via press/hold in _unhandled_input."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-INP-004
    system: input
    gdd: design/gdd/input.md
    requirement: "Context gating mandatory: every gameplay _unhandled_input checks InputContext.is_active(GAMEPLAY) before consuming."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-INP-005
    system: input
    gdd: design/gdd/input.md
    requirement: "Three mandatory ADR-0004-locked actions: ui_cancel (Esc + B/Circle), interact (E + A/Cross), pause (Esc + START)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-INP-006
    system: input
    gdd: design/gdd/input.md
    requirement: "Runtime rebinding via InputMap.action_erase_events + action_add_event; persists to user://settings.cfg per ADR-0003."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-INP-007
    system: input
    gdd: design/gdd/input.md
    requirement: "Modal dismiss via _unhandled_input + ui_cancel action, never via focused Button widget (Godot 4.6 dual-focus sidestep per ADR-0004)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-INP-008
    system: input
    gdd: design/gdd/input.md
    requirement: "get_viewport().set_input_as_handled() MUST be called after handler consumes event."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-INP-009
    system: input
    gdd: design/gdd/input.md
    requirement: "Gamepad partial at MVP (menu navigation complete); full rebinding parity post-MVP per technical-preferences.md."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-INP-010
    system: input
    gdd: design/gdd/input.md
    requirement: "InputContext.LOADING context exists and is pushed/popped by LevelStreamingService during transitions (LS-Gate-2)."
    created: 2026-04-22
    revised: ""
    status: active

  # ─── Audio (AUD) ──────────────────────────────────────────────────────────
  - id: TR-AUD-001
    system: audio
    gdd: design/gdd/audio.md
    requirement: "AudioManager is subscriber-only across 30 signals (9 gameplay domains + Settings); publishes nothing."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-002
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Five named AudioServer buses: Music, SFX, Ambient, Voice, UI; no player routes to Master directly."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-003
    system: audio
    gdd: design/gdd/audio.md
    requirement: "AudioManager lives as Node in persistent root scene (not autoload); connects all subscriptions in _ready, disconnects in _exit_tree on game quit."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-004
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Music architecture: MusicDiegetic + MusicNonDiegetic + MusicSting (two layers + one-shot), all on Music bus; Formula 1 state-keyed per-layer ducking."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-005
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Music state grid: [location]_[alert_level] (5 locations × 4 alert states) + special states DOCUMENT_OVERLAY, CUTSCENE, MAIN_MENU, MISSION_COMPLETE."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-006
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Music crossfade only (Tween on volume_db, never stop-and-start); state-keyed transition table (2.0 s default, 1.5 s SUSPICIOUS, 0.8 s SEARCHING, 0.3 s COMBAT, 3.0 s de-escalate)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-007
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Spatial SFX pool: 16 pre-allocated AudioStreamPlayer3D nodes, oldest-non-critical steal on overflow; no runtime allocation."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-008
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Music preload at section_entered (8-12 MB/section, two stereo OGGs); not streamed — tight crossfades are Pillar 3 load-bearing."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-009
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Per-section AudioEffectReverb swapped on section_entered (Plaza/Scaffolds/Restaurant/Upper/Bomb presets)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-010
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Dominant-guard Dictionary[Node, AlertState]; music state driven by HIGHEST alert level; cleared on section_exited and respawn_triggered."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-011
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Stinger debounce: max one MusicSting brass stab per 120 BPM downbeat window (0.5 s); quantized to next beat; SCRIPTED-cause suppresses."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-AUD-012
    system: audio
    gdd: design/gdd/audio.md
    requirement: "Takedown SFX routes by takedown_type: MELEE_NONLETHAL → chloroform whoosh; STEALTH_BLADE → blade stroke (post-ADR-0002 amendment signature)."
    created: 2026-04-22
    revised: ""
    status: active

  # ─── Outline Pipeline (OUT) ───────────────────────────────────────────────
  - id: TR-OUT-001
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Every visible MeshInstance3D writes a stencil tier 0-3 at spawn time via ADR-0001 OutlineTier.set_tier (hands exempt per ADR-0005)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-OUT-002
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Stencil values map to outline weights: 0=none, 1=4 px, 2=2.5 px, 3=1.5 px at 1080p."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-OUT-003
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Outline color uniform across tiers: #1A1A1A near-black."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-OUT-004
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Kernel scales with resolution: kernel_actual = kernel_px × resolution_scale × (current_height / 1080.0)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-OUT-005
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Outline pass runs as single Godot 4.6 CompositorEffect after opaque geometry, before sepia-dim and transparent layers."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-OUT-006
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Performance budget: ≤2.0 ms at 1080p (target 0.8-1.5 ms on RTX 2060); fits within 75% scale on Iris Xe."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-OUT-007
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Resolution scale default 0.75 on Iris Xe, 1.0 on desktop GPU; detection in Settings & Accessibility."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-OUT-008
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Outline detection via Sobel or Laplacian edge-detect kernel on depth buffer with configurable edge_threshold (shader-algorithm detail deferred to future ADR)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-OUT-009
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Lighting MUST NOT weaken outlines: outline pass operates on color buffer after diegetic lighting."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-OUT-010
    system: outline-pipeline
    gdd: design/gdd/outline-pipeline.md
    requirement: "Runtime tier reassignment supported via OutlineTier.set_tier(mesh, new_tier) for scripted focal moments."
    created: 2026-04-22
    revised: ""
    status: active

  # ─── Post-Process Stack (PP) ──────────────────────────────────────────────
  - id: TR-PP-001
