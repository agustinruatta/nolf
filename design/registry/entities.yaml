    value: 4.0
    unit: m
    notes: "Discrete spike. Latched as NoiseEvent{type=JUMP_TAKEOFF, radius_m=4.0, origin=<position at takeoff>}; auto-expires after spike_latch_duration_sec. **Default raised 0.1 → 0.15 s (6 → 9 frames @ 60 Hz) on 2026-04-21 per ai-programmer B-2 fix** — 6-frame window did not cover every 10 Hz guard phase offset. 9 frames = 1.5× AI-tick window at 10 Hz. Idempotent-read (every guard within the window sees the same event; auto-expiry is sole clear); physics-tick-rate-independent. `noise_global_multiplier` is ship-locked to 1.0 per game-designer B-2 closure 2026-04-21, so the returned radius equals the base value."
    added: 2026-04-19
    revised: "2026-04-21"
  - name: player_noise_hard_landing_base
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
      - design/gdd/audio.md
    value: 8.0
    unit: m
    notes: "Base radius of a hard-landing spike. Triggered when |velocity.y| > v_land_hard, where v_land_hard = sqrt(2 * player_gravity * player_hard_land_height) — runtime-derived per F.3. **Scaled per OQ-7 closure 2026-04-21**: noise_radius = 8.0 × clamp(|velocity.y|/v_land_hard, 1.0, 2.0). Emitted radius range: 8.0 (at threshold) to 16.0 (at 2× threshold, capped). Latched as NoiseEvent{type=LANDING_HARD, radius_m=scaled value, origin=<landing site>}; auto-expires after spike_latch_duration_sec (0.15 s = 9 frames @ 60 Hz). Renamed from player_noise_hard_landing (was value=8.0, unit=m, binary) to player_noise_hard_landing_base — the 8.0 is now the floor of a scaled range, not a fixed value."
    added: 2026-04-19
    revised: "2026-04-21"
  - name: player_noise_hard_landing_cap
    status: active
    source: design/gdd/player-character.md
    referenced_by:
