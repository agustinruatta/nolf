  - id: TR-CD-019
    system: combat-damage
    gdd: design/gdd/combat-damage.md
    requirement: "UNCONSCIOUS Transitional model: DART/FIST → UNCONSCIOUS (no enemy_killed); further lethal on UNCONSCIOUS → DEAD + enemy_killed; further non-lethal on UNCONSCIOUS = no-op."
