      - design/gdd/audio.md
    value: 16.0
    unit: m
    notes: "Maximum emitted radius of a hard-landing spike after F.3 scaling (2× base). Prevents pathological values from falls beyond 2× v_land_hard. Documented 2026-04-21 as part of OQ-7 closure. Audio 4-bucket scheme (adopted 2026-04-21) routes this to the `extreme` stem bucket (>10 m)."
    added: 2026-04-21
    revised: ""
  - name: player_noise_landing_soft
    status: active
    source: design/gdd/player-character.md
    referenced_by:
