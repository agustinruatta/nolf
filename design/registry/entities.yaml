    notes: "Combat-owned default; Settings & Accessibility (forward-dep) exposes selector. HUD V.6 implements via two concentric draw_arc calls (Parchment outer 1 px + Ink Black #1A1A1A inner 1 px) + draw_circle for dot. tri_band guarantees ≥3:1 contrast against both light backgrounds (Ink Black inner dominates) and dark backgrounds (Parchment outer dominates). parchment_only fails ux-designer BLOCKER-3 contrast test against sepia exterior. none disables halo entirely."
    added: 2026-04-25
    revised: ""

  - name: crosshair_enabled
    status: active
    source: design/gdd/combat-damage.md
    referenced_by:
      - design/gdd/combat-damage.md   # §UI-6 — opt-out toggle, default-on
      - design/gdd/hud-core.md        # CR-11 visibility gating; AC-HUD-7.3/7.4
    value: true
    safe_range: [true, false]
    unit: bool
    notes: "Combat-owned default (true / opt-out by default). Settings & Accessibility (forward-dep) owns persistence + UI placement. Per Combat §UI-6: surfaced via BOTH `Settings → Accessibility → Crosshair` AND `Settings → HUD → Crosshair` (single source of truth, dual discovery paths). HUD Core CR-11 mirrors `_crosshair_enabled_mirror` from `setting_changed('hud', 'crosshair_enabled', value)`; crosshair Control visible iff `(hud_root.visible == true) AND (_crosshair_enabled_mirror == true)`."
    added: 2026-04-25
    revised: ""

  - name: gadget_rejected_desat_duration_s
    status: active
    source: design/gdd/hud-core.md
    referenced_by:
      - design/gdd/hud-core.md           # CR-9 + G.1 + AC-HUD-5.3 — gadget tile rejection desaturation lifetime
      - design/gdd/inventory-gadgets.md  # CR-4b + UI-9 — paired with `gadget_activation_rejected` signal contract
    value: 0.2
    safe_range: [0.1, 0.5]
    unit: seconds
    notes: "HUD-owned tuning knob. Duration the gadget tile holds modulate=(0.4,0.4,0.4,1.0) after gadget_activation_rejected fires (Inventory CR-4b gate-fail cue per ADR-0002 amendment 2026-04-24). Below 0.1 s the desat is imperceptible; above 0.5 s it lingers into the next interaction. Implemented via dedicated Timer child (oneshot) per CR-9 — no _process polling. 10+ rapid rejections in one frame restart the timer (CR-9 + AC-HUD-5.6); the 10th rejection owns the 0.2 s window."
    added: 2026-04-25
    revised: ""

  - name: HUDCore
    status: active
    source: design/gdd/hud-core.md
    type: cross_system_class
    referenced_by:
      - design/gdd/hud-core.md           # owns the class; CanvasLayer scene at index 1; instanced once per main scene
      - design/gdd/hud-state-signaling.md  # forward-dep (system #19, VS) — extends HUD Core via get_prompt_label() per UI-3
    class_name: HUDCore
    base: CanvasLayer
    autoload: false   # HUD is per-main-scene CanvasLayer instance, NOT autoload (FP-13; ADR-0007 caps autoloads at 7)
    canvas_layer_index: 1   # within ADR-0004 §7 0..3 reserved range; below sepia dim layer 4
    public_extension_api:
      - "get_prompt_label() -> Label  # HUD State Signaling (system #19, VS) writes additional states through this single forward extension point"
    notes: "HUD Core is the screen-space subscriber surface for 10 ADR-0002 signals (8 frozen + 2 amendment: ui_context_changed + takedown_availability_changed). Emits zero signals. Polls only 2 PC accessors (get_current_interact_target + is_hand_busy). 5 widgets: Health BL / Weapon+Ammo BR / Gadget tile TR / Prompt-strip CB / Crosshair centre. Persists across section_entered without re-subscribing (CR-15). No capture()/restore_callback — rebuilds via signal replay on LOAD_FROM_SAVE (CR-14). HSS forward-extension via get_prompt_label() is the single permitted external API."
    added: 2026-04-25
    revised: ""

