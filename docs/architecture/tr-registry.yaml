    revised: ""
    status: active
  - id: TR-CD-017
    system: combat-damage
    gdd: design/gdd/combat-damage.md
    requirement: "Return-fire timer handshake: guard subscribes to player_damaged; synchronous stop+restart _combat_lost_target_timer if source==self AND state==COMBAT (prevents cross-signal hazards)."
