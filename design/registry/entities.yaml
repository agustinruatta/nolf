# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: damage_formula
    status: active
    source: design/gdd/combat-damage.md
    referenced_by:
      - design/gdd/combat-damage.md
      - design/gdd/player-character.md    # PC F.6 consumes via apply_damage(amount, source, damage_type)
      - design/gdd/stealth-ai.md          # SAI guards consume via receive_damage
    variables:
      - base_damage
      - is_headshot
      - target_is_guard
      - H
    expression: "final_damage = base_damage × H  where H = 2.0 iff (is_headshot == true AND target_is_guard == true), else H = 1.0"
    default_range: [34, 240]  # 2026-04-27 (/consistency-check C1 fix): split from prior single output_range:[13,240]. Default tuning floor = pistol body 34; ceiling = rifle headshot 120×2 = 240. Synced to combat-damage.md §F.1 + §F.6 per L457 prescription after the 2026-04-22 fists rework (fist_base_damage 16→40 lifted floor from 13 to 34).
    safe_range: [34, 300]     # 2026-04-27 (/consistency-check C1 fix): safe-range floor = same 34 (pistol body / fist safe floor); ceiling = rifle headshot at safe-tune ceiling 150×2 = 300.
    output_range: [34, 240]   # DEPRECATED-but-kept alias = default_range. Was [16,240] pre-2026-04-21, then [13,240] until 2026-04-27 (fist floor was reworked 16→40 in combat-damage.md 2026-04-22; registry sync deferred until /consistency-check 2026-04-27 C1).
    spread_range: [2.0, 20.0] # added 2026-04-22 per combat-damage.md §F.3 claim (systems-designer Finding 5 — safe-range ceilings). Default-tuning output: [2.0, 13.0]; safe-range max: 20° (9° sprint + 6° cover + 5° falloff). Co-located with damage_formula because §F.3 is the guard-spread sub-formula of the same damage pipeline.
    notes: "Combat & Damage F.1 master damage formula. Eve's apply_damage intake and guard's receive_damage intake both consume final_damage. Headshot multiplier is computed internally in Combat BEFORE emission — enemy_damaged.amount is post-multiplier. Target_is_guard gate prevents headshot multiplier on Eve (guards always fire body-only). Default-range floor 34 = pistol body / fist safe floor (post 2026-04-22 fists rework — fist_base_damage 40 default, safe range [34,50]); default ceiling 240 = rifle headshot (120×2). Safe-range ceiling 300 = rifle headshot at safe-tune max (150×2). spread_range covers the F.3 guard-spread sub-formula output (default [2.0, 13.0], safe-range ceiling 20°)."
    added: 2026-04-21
    revised: 2026-04-27   # C1 fix: output_range floor 13→34 + split into default_range/safe_range per combat-damage.md L457 prescription.

