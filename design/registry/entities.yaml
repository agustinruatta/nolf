    referenced_by:
      - design/gdd/player-character.md
    value: 3.5
    unit: m/s
    added: 2026-04-19
    revised: ""
  - name: player_sprint_speed
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 5.5
    unit: m/s
    added: 2026-04-19
    revised: ""
  - name: player_crouch_speed
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 1.8
    unit: m/s
    added: 2026-04-19
    revised: ""
  - name: player_crouch_sprint_speed
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 2.4
    unit: m/s
    notes: "Must stay below player_walk_speed to preserve stealth/speed tradeoff."
    added: 2026-04-19
    revised: ""

