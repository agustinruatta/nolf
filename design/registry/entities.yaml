    value: 5.0
    unit: m
    notes: "Discrete spike. Triggered on landing when |velocity.y| ≤ v_land_hard (i.e., any landing below the hard threshold). Latched as NoiseEvent{type=LANDING_SOFT, radius_m=5.0, origin=<landing site>}; auto-expires after spike_latch_duration_sec (0.15 s on 2026-04-21). Idempotent-read, physics-tick-rate-independent. `noise_global_multiplier` ship-locked to 1.0 on 2026-04-21, so emitted radius equals base."
    added: 2026-04-20
    revised: "2026-04-21"

