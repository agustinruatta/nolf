    status: active
  - id: TR-SAI-003
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "Six SAI signals: alert_state_changed(actor, old, new, severity), actor_became_alerted(actor, cause, pos, severity), actor_lost_target(actor, severity), takedown_performed(actor, attacker, takedown_type), guard_incapacitated(guard), guard_woke_up(guard) — last 2 PENDING ADR-0002 amendment."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-004
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "StealthAI.Severity enum: MAJOR | MINOR (controls Audio stinger emission — Pillar 1 comedy preservation)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-005
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "StealthAI.AlertCause enum: SAW_PLAYER | SAW_BODY | HEARD | ALERTED_BY_OTHER | SCRIPTED; SAW_BODY 2× sight_fill multiplier; SCRIPTED suppresses Audio stinger."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-006
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "StealthAI.TakedownType enum: MELEE_NONLETHAL (dart/fist KO) | STEALTH_BLADE (lethal blade) — routes Audio SFX variants + SAI state consequences."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-007
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "F.1 Sight fill: 0-6.0/sec (max 6.0 post-4th-pass correction); LOS raycast cache + frame-invalidation; range linear falloff to 18 m; state_multiplier UNAWARE=1.0, SUSPICIOUS=1.5, SEARCHING=1.5, COMBAT=2.0; body_factor 1.0 alive / 2.0 dead."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-008
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "F.2 Sound fill: polled 10 Hz (6-frame interval); reads PC.get_noise_level() + occlusion raycast + elevation_factor (0 if floor_delta != 0)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-009
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "F.3 Accumulator state-keyed per-state decay; both channels must drop below T_DECAY_UNAWARE (0.1) for SUSPICIOUS → UNAWARE."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-010
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "F.4 Alert propagation: ALERT_PROPAGATION_RADIUS_M=25 m, PROPAGATION_BUMP=0.4 (safe range [0.41, 0.6]); propagated bumps emit alert_state_changed but NOT actor_became_alerted (no stinger)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-011
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "F.5 State-transition thresholds: T_SUSPICIOUS=0.3, T_SEARCHING=0.6, T_COMBAT=0.95; accumulators clamp [0, 1]."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-012
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "Public accessor has_los_to_player() -> bool: cache-hit path, 10 Hz stale-safe, ≤1-frame lag; cold-start safe (false until F.1 ticks)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-013
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "Public accessor takedown_prompt_active(attacker: Node) -> bool: true iff attacker eligible (UNAWARE/SUSPICIOUS + rear half-cone dot≤0 + ≤1.5 m + no LOS + valid instance)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-014
    system: stealth-ai
    gdd: design/gdd/stealth-ai.md
    requirement: "receive_damage(amount, source, damage_type) -> bool is_dead: synchronous mutation of _health + current_alert_state BEFORE return (no call_deferred); routes via Combat.is_lethal_damage_type()."
