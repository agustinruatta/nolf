# Input action catalog fixture — single source of truth for AC-INPUT-1.1.
# Schema:
#   action_name:        StringName used in InputMap / InputActions constants
#   kb_event_type:      Godot InputEvent class name (InputEventKey | InputEventMouseButton | null)
#   kb_event_value:     physical_keycode (Key) or button_index (MouseButton) integer; null if no KB binding
#   gamepad_event_type: Godot InputEvent class name (InputEventJoypadButton | InputEventJoypadMotion | null)
#   gamepad_event_value: {button_index: int} or {axis: int, axis_value: float}; null if no gamepad binding
#
# Source: design/gdd/input.md §Section C (36 actions).
# 33 rows here = gameplay/UI only. Debug actions (Group 6) excluded per AC-INPUT-5.3.
# Gamepad note: JOY_BUTTON_START = button_index 6 per Godot 4.6 SDL3 driver (NOT 11).
#               JOY_BUTTON_DPAD_UP = button_index 11 (distinct from START).
# Mouse note:   look_horizontal/look_vertical have no KB/M button event — mouse motion
#               is read directly via event.relative in the Player Character controller.
#               Only the gamepad axis binding is registered in project.godot for these actions.
#
# Key code reference (Godot 4.6 physical_keycode values):
#   W=87, S=83, A=65, D=68, E=69, F=70, Q=81, R=82, Space=32, Enter=4194309
#   Escape=4194305, Left Ctrl=4194326, Left Shift=4194325
#   1=49, 2=50, 3=51, 4=52, 5=53
#   Arrow Up=4194320, Arrow Down=4194321, Arrow Left=4194318, Arrow Right=4194322
#   F5=4194336, F9=4194340
# Mouse button_index: LEFT=1, RIGHT=2, WHEEL_UP=4, WHEEL_DOWN=5, BUTTON_4=8, BUTTON_5=9
# JOY axis indices: LEFT_X=0, LEFT_Y=1, RIGHT_X=2, RIGHT_Y=3, TRIGGER_LEFT=4, TRIGGER_RIGHT=5
# JOY button indices: A=0, B=1, X=2, Y=3, START=6, LS=7, RS=8, DPAD_UP=11, DPAD_DOWN=12, DPAD_LEFT=13, DPAD_RIGHT=14

