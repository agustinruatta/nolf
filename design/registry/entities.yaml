# ─── ENTITIES ────────────────────────────────────────────────────────────────
# Named game-world objects: enemies, NPCs, characters, factions, bosses.
# Register an entity here when it appears in more than one GDD — e.g., an
# enemy defined in combat.md that also drops items listed in inventory.md.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: any key stats that could appear in another GDD
#   (health, damage, drops, faction, etc.)

entities:
  - name: phantom_guard
    status: active
    source: design/gdd/stealth-ai.md
    referenced_by:
      - design/gdd/stealth-ai.md
      - design/gdd/combat-damage.md
    role: npc_antagonist
    faction: PHANTOM
    affiliation: PHANTOM_criminal_syndicate
    uniform: black_red_per_art_bible_4.4
    outline_tier: MEDIUM  # ADR-0001
    body_height_standing_m: 1.8  # taller than Eve (1.7) for visual contrast
    eye_height_m: 1.7
    head_bone_name: "head"  # added 2026-04-22 per combat-damage.md §C.3 (systems-designer Finding 10). Canonical asset contract: the head bone MUST be named "head" (lowercase, exact string). Riggers using alternate names (Head / head_bone / Bip01_Head) produce silent fallback to root-origin Y=0 — a fairness failure. Enforced by asset-audit script that greps guard .tscn BoneAttachment3D bone property against this value.
    health_hp: 100  # Finalised by Combat & Damage GDD 2026-04-21 — confirmed 100 HP
    perception_channels: [sight, sound]
    alert_states: [UNAWARE, SUSPICIOUS, SEARCHING, COMBAT, UNCONSCIOUS, DEAD]  # 6th state UNCONSCIOUS added 2026-04-22 via OQ-CD-1 SAI amendment (stealth-ai.md 3rd revision pass).
    takedowns_valid_in: [UNAWARE, SUSPICIOUS]
    takedown_types: [MELEE_NONLETHAL, STEALTH_BLADE]  # MELEE_NONLETHAL → UNCONSCIOUS; STEALTH_BLADE → DEAD via Combat CR-15 MELEE_BLADE delegation.
    terminal_state_routing:  # OQ-CD-1 closed 2026-04-22 — stealth-ai.md §C Takedown target-side effect.
      - MELEE_NONLETHAL_takedown: UNCONSCIOUS
      - STEALTH_BLADE_takedown: DEAD  # via Combat.apply_damage_to_actor with DamageType.MELEE_BLADE (lethal)
      - lethal_damage_at_0_hp: DEAD   # BULLET / MELEE_BLADE / FALL_OUT_OF_BOUNDS per Combat is_lethal_damage_type()
      - non_lethal_damage_at_0_hp: UNCONSCIOUS  # DART_TRANQUILISER / MELEE_FIST
      - transitional_unconscious_to_dead: via lethal receive_damage on UNCONSCIOUS guard
    public_accessors:  # NEW 2026-04-22 per OQ-CD-1 item 5 (stealth-ai.md §C.3 Combat & Damage dep row).
      - has_los_to_player() -> bool          # returns SAI F.1 perception cache most-recent LOS result; no new raycast per call; consumed by Combat GuardFireController.
      - takedown_prompt_active(attacker) -> bool  # eligibility: state ∈ {UNAWARE, SUSPICIOUS} + rear-180° half-cone + ≤1.5 m + no LOS; consumed by Combat Takedown-input gate (CR-10).
    receive_damage_contract:  # NEW 2026-04-22 per OQ-CD-1 items 2–3 + 6.
      signature: "receive_damage(amount: int, source: Node, damage_type: Combat.DamageType) -> bool is_dead"
      routing: "lethal → DEAD + returns true; non-lethal at 0 HP → UNCONSCIOUS + returns false; UNCONSCIOUS + lethal → DEAD (Transitional) + returns true; UNCONSCIOUS + non-lethal → no-op + returns false; DEAD + any → no-op + returns true"
      synchronicity: "current_alert_state mutated synchronously before return (NO call_deferred) — guarantees Combat CR-2 signal ordering observes correct state"
    patrol_speed_m_per_s: 1.2
    investigate_speed_m_per_s: 1.6
    combat_sprint_speed_m_per_s: 3.0
    takedown_range_m: 1.5  # TAKEDOWN_RANGE_M used by takedown_prompt_active accessor (NEW 2026-04-22).
    notes: "Generic antagonist archetype. Per-variant uniforms (caterer, custodian) and voice pools owned by Mission Scripting + Dialogue & Subtitles GDDs. Combat & Damage GDD (2026-04-21) confirms health_hp=100. OQ-CD-1 SAI amendment bundle CLOSED 2026-04-22 via stealth-ai.md 3rd revision pass: UNCONSCIOUS 6th state, receive_damage -> bool is_dead synchronous contract, lethality routing via Combat.is_lethal_damage_type(), Transitional UNCONSCIOUS→DEAD model, MELEE_NONLETHAL → UNCONSCIOUS (fictional non-lethality, symmetric with Combat CR-16 MELEE_FIST), public accessors has_los_to_player + takedown_prompt_active, approach-vector capture at terminal-entry for body-drop animator (§V.4 Combat). Unblocks Combat AC-CD-7.1, AC-CD-7.3, AC-CD-6.1 return-value-correct paths."
    added: 2026-04-21
    revised: 2026-04-22

