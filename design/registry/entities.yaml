      - design/gdd/player-character.md
    value: 5.0
    unit: m
    added: 2026-04-19
    revised: ""
  - name: player_noise_sprint
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
      - design/gdd/audio.md
      - design/gdd/stealth-ai.md
    value: 12.0
    unit: m
    notes: "Raised from 9.0 → 12.0 in Session F (2026-04-21 re-draft) to close GD-B3 Sprint dominance. Speed-per-noise at 12 m = 0.46, strictly worse than Walk (0.70) and Crouch (0.60) — restores Sneak/Crouch as dominant stealth strategy (Pillar 3)."
    added: 2026-04-19
    revised: "2026-04-21"
  - name: player_noise_crouch
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 3.0
    unit: m
    added: 2026-04-19
    revised: ""
  - name: player_noise_crouch_sprint
    status: deprecated
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 9.0
    unit: m
    notes: "DEPRECATED 2026-04-20 (orphan cleanup): CrouchSprint state was cut entirely in Session A (2026-04-19) per review item R-4 — strictly slower than Walk and with the same noise as Sprint, it served no tactical niche. Entry retained for audit trail only; do NOT reference in new GDDs."
    added: 2026-04-19
    revised: "2026-04-20"
  - name: player_noise_jump_takeoff
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 4.0
    unit: m
    notes: "Discrete spike. Latched as NoiseEvent{type=JUMP_TAKEOFF, radius_m=4.0, origin=<position at takeoff>}; auto-expires after spike_latch_duration_sec. **Default raised 0.1 → 0.15 s (6 → 9 frames @ 60 Hz) on 2026-04-21 per ai-programmer B-2 fix** — 6-frame window did not cover every 10 Hz guard phase offset. 9 frames = 1.5× AI-tick window at 10 Hz. Idempotent-read (every guard within the window sees the same event; auto-expiry is sole clear); physics-tick-rate-independent. `noise_global_multiplier` is ship-locked to 1.0 per game-designer B-2 closure 2026-04-21, so the returned radius equals the base value."
    added: 2026-04-19
    revised: "2026-04-21"
  - name: player_noise_hard_landing_base
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
      - design/gdd/audio.md
    value: 8.0
    unit: m
    notes: "Base radius of a hard-landing spike. Triggered when |velocity.y| > v_land_hard, where v_land_hard = sqrt(2 * player_gravity * player_hard_land_height) — runtime-derived per F.3. **Scaled per OQ-7 closure 2026-04-21**: noise_radius = 8.0 × clamp(|velocity.y|/v_land_hard, 1.0, 2.0). Emitted radius range: 8.0 (at threshold) to 16.0 (at 2× threshold, capped). Latched as NoiseEvent{type=LANDING_HARD, radius_m=scaled value, origin=<landing site>}; auto-expires after spike_latch_duration_sec (0.15 s = 9 frames @ 60 Hz). Renamed from player_noise_hard_landing (was value=8.0, unit=m, binary) to player_noise_hard_landing_base — the 8.0 is now the floor of a scaled range, not a fixed value."
    added: 2026-04-19
    revised: "2026-04-21"
  - name: player_noise_hard_landing_cap
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
      - design/gdd/audio.md
    value: 16.0
    unit: m
    notes: "Maximum emitted radius of a hard-landing spike after F.3 scaling (2× base). Prevents pathological values from falls beyond 2× v_land_hard. Documented 2026-04-21 as part of OQ-7 closure. Audio 4-bucket scheme (adopted 2026-04-21) routes this to the `extreme` stem bucket (>10 m)."
    added: 2026-04-21
    revised: ""
  - name: player_noise_landing_soft
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 5.0
    unit: m
    notes: "Discrete spike. Triggered on landing when |velocity.y| ≤ v_land_hard (i.e., any landing below the hard threshold). Latched as NoiseEvent{type=LANDING_SOFT, radius_m=5.0, origin=<landing site>}; auto-expires after spike_latch_duration_sec (0.15 s on 2026-04-21). Idempotent-read, physics-tick-rate-independent. `noise_global_multiplier` ship-locked to 1.0 on 2026-04-21, so emitted radius equals base."
    added: 2026-04-20
    revised: "2026-04-21"

