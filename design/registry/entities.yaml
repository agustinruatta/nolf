    value: 3.8
    unit: m/s
    notes: "Yields ~0.60 m apex with player_gravity = 12.0."
    added: 2026-04-19
    revised: ""
  - name: player_hard_land_height
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 1.5
    unit: m
    notes: "Drop height above which camera dip + hard-landing noise spike trigger. Runtime velocity threshold is computed: v_land_hard = sqrt(2 * player_gravity * player_hard_land_height); at default gravity=12.0 this yields 6.0 m/s. Renamed from player_hard_land_threshold (was value=6.0, unit=m/s) per Session D B-8 to decouple from gravity."
    added: 2026-04-19
    revised: "2026-04-19"

