    revised: ""
    status: active
  - id: TR-CD-016
    system: combat-damage
    gdd: design/gdd/combat-damage.md
    requirement: "Projectile/fire-controller cleanup on respawn: self-subscribe to Events.respawn_triggered in _ready(); darts queue_free, GuardFireController IDLE + timer stop."
