    revised: ""
    status: active
  - id: TR-CD-014
    system: combat-damage
    gdd: design/gdd/combat-damage.md
    requirement: "NOLF1 ammo economy: guard lethal drops 3 pistol rounds (net-negative), 1 dart (break-even), 0 on fist-KO (no-farm); starting pistol 32, dart 16; respawn floor {pistol 16, dart 8} once per checkpoint; caps {pistol 48, dart 24}."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-CD-015
    system: combat-damage
    gdd: design/gdd/combat-damage.md
    requirement: "Guard return-fire cadence: GuardFireController state machine {IDLE, DRAW, LOS, SUPPRESSION, CAPPED}; first-shot 0.65 s delay; LOS 1.4 s/shot; SUPPRESSION 2.8 s/shot capped 3 max; transitions via SAI.has_los_to_player()."
