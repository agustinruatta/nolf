    gdd: design/gdd/stealth-ai.md
    requirement: "RaycastProvider DI interface: IRaycastProvider + RealRaycastProvider + CountingRaycastProvider test double (for AC-SAI-3.9 raycast budget tests)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAI-017
