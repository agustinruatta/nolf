# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: unmarked_visible_mesh
    status: active
    description: "A spawning system must not instantiate a MeshInstance3D (or any VisualInstance3D producing a visible surface) without a paired OutlineTier.set_tier(mesh, tier) call. The default cleared stencil value is 0 (no outline)."
    why: "Unmarked meshes will write stencil 0, receiving no outline rendering. This silently breaks Art Bible Section 1 Principle 2 (Silhouette Owns Readability) and the figure-ground hierarchy that Pillar 3 (Stealth is Theatre) depends on. The break is invisible in code review unless this rule is explicit."
    adr: docs/architecture/adr-0001-stencil-id-contract.md
    added: 2026-04-19

  - pattern: autoload_singleton_coupling
    status: active
    description: "Systems must not reach into autoload singletons by name to call business-logic methods. The Events autoload exists to dispatch typed signals — not to be called as a service locator. Use Events.signals or dependency injection for cross-system communication."
    why: "Tight coupling to Autoloads makes systems untestable in isolation, creates hidden dependencies that break when Autoload load order changes, and produces a service-locator god-object. The Events autoload is exempt only because it has no methods or state — only signal declarations."
    adr: docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    added: 2026-04-19

  - pattern: events_with_state_or_methods
    status: active
    description: "The Events.gd autoload must contain ONLY typed signal declarations. No state variables, no methods (including emit helpers), no node references, no business logic. Adding any of these turns the bus into the autoload-singleton-coupling anti-pattern."
    why: "Signal declarations are a contract. Adding state or methods on top of the contract conflates the bus with a service layer, encourages polling-style usage, and makes the bus untestable. The discipline must be enforced at code-review time on every PR touching events.gd."
    adr: docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    added: 2026-04-19

  - pattern: wrapper_emit_methods
    status: active
    description: "Publishers must emit signals directly (Events.player_damaged.emit(amount, source, is_critical)). Wrapper methods on the bus (e.g., Events.emit_player_damaged(args)) are forbidden — they provide no type-safety benefit and start treating the bus as a service layer."
    why: "Direct emit is the Godot 4.x idiomatic pattern. Wrappers add boilerplate, hide the signal, and make refactoring harder (renaming a signal requires updating both the signal and its wrapper). The signal declaration already enforces types."
    adr: docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    added: 2026-04-19

  - pattern: reemit_engine_signals_through_bus
    status: active
    description: "Built-in Godot signals (SceneTree.node_added, Window.size_changed, Input.joy_connection_changed, etc.) must NOT be re-emitted through the Events bus. Systems that need engine signals connect to them directly via get_tree() or the relevant singleton."
    why: "Re-emitting engine signals creates double-dispatch overhead and ambiguity (is a subscriber reacting to an engine event or a game event?). The bus is for game-domain events only. The Godot engine has its own signal system; do not shadow it."
    adr: docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    added: 2026-04-19

  - pattern: synchronous_request_response_through_bus
    status: active
    description: "The Events bus is fire-and-forget. Do not implement synchronous request-response patterns through signals (e.g., emitting a query signal expecting a callback to be set on the payload, or polling a result property after emit). For request-response, use direct method calls or async patterns (await) on the owning system."
    why: "Signal dispatch order is not guaranteed across multiple subscribers, and there is no single 'response' from a broadcast. Trying to force RPC-like semantics through a broadcast bus produces race conditions and brittle ordering dependencies."
    adr: docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    added: 2026-04-19

  - pattern: save_service_assembles_state
    status: active
    description: "SaveLoadService MUST NOT query game systems to assemble a SaveGame. The caller (Mission Scripting at section transitions, Failure & Respawn on death, or a player-triggered save action) reads current state from each owning system and constructs the SaveGame, then passes it to SaveLoad.save_to_slot(slot, save_game). SaveLoadService writes/reads files only."
    why: "If SaveLoadService held references to PlayerCharacter, StealthAI, etc., it would become a service-locator god-object — the exact autoload-singleton-coupling anti-pattern banned in ADR-0002. By accepting a pre-assembled SaveGame, SaveLoadService stays in its persistence lane and remains testable in isolation."
    adr: docs/architecture/adr-0003-save-format-contract.md
    added: 2026-04-19

  - pattern: save_state_uses_node_references
    status: active
    description: "Saved Resources MUST NOT contain NodePath, Node, or any other reference type that depends on a live scene tree. Use stable actor_id: StringName values set on the actor's script via @export, with section-scene authoring enforcing uniqueness. Per-actor state is stored as Dictionary[StringName, Resource] keyed by actor_id."
    why: "NodePath / Node references cannot be resolved at file-load time because the scene tree does not exist yet. Saving a NodePath produces a string that may or may not resolve after section reload — silent failure mode. Stable string IDs survive reload and are explicit."
    adr: docs/architecture/adr-0003-save-format-contract.md
    added: 2026-04-19

  - pattern: forgotten_duplicate_deep_on_load
    status: active
    description: "After ResourceLoader.load(slot_path) returns a SaveGame, the caller MUST call .duplicate_deep() before assigning nested *_State Resources to live systems. The deep-duplicated copy is what live systems mutate; the loaded original may be cached for 'reload section' functionality."
    why: "If live systems mutate the loaded SaveGame's nested Resources directly, the cached loaded resource becomes dirty. A subsequent reload-from-cached-resource would restore post-mutation state, not checkpoint state. duplicate_deep() (added in Godot 4.5) is the explicit deep-copy API; old duplicate() does not deep-copy nested Resources."
    adr: docs/architecture/adr-0003-save-format-contract.md
    added: 2026-04-19

  - pattern: input_context_service_locator
    status: active
    description: "InputContext autoload MUST contain ONLY the push/pop stack and current/is_active query methods. No node references, no methods that act on UI surfaces, no signals (cross-system reactions go through Events.gd). The principled exemption from autoload_singleton_coupling is the same one that justifies SaveLoadService: it owns its domain (input routing), it is not a service locator."
    why: "If InputContext starts holding UI surface references or emitting its own signals, it becomes a parallel signal bus and a service locator god-object. The forbidden_pattern fence prevents drift; code review on every PR touching input_context.gd."
    adr: docs/architecture/adr-0004-ui-framework.md
    added: 2026-04-19

  - pattern: font_registry_as_autoload
    status: active
    description: "FontRegistry MUST be a static class (class_name FontRegistry extends RefCounted) with static functions and preloaded font constants. It MUST NOT be registered as an autoload. Callers invoke FontRegistry.hud_numeral(size_px), etc., as static method calls."
    why: "An autoload FontRegistry would straddle the autoload_singleton_coupling boundary — font resolution is asset infrastructure but it would be reachable as a node by name, opening service-locator drift. A static class with preload constants achieves the identical API without crossing the anti-pattern boundary; it is testable in isolation and has no node lifecycle."
    adr: docs/architecture/adr-0004-ui-framework.md
    added: 2026-04-19

  - pattern: hardcoded_visible_string
    status: active
    description: "Every visible string in the UI MUST go through tr() (or equivalent localization-aware function) from day one. Hardcoded strings in Label.text, Button.text, RichTextLabel.text, or any user-facing display field are forbidden — even if the project ships English-only at MVP."
    why: "Retrofitting tr() across the entire UI codebase later is a project-wide refactor. The scaffold cost is one tr() call per string at authoring time; the retrofit cost is unbounded. Localization Scaffold (system 7) provides the string-table mechanism; this fence enforces its use."
    adr: docs/architecture/adr-0004-ui-framework.md
    added: 2026-04-19

  - pattern: modal_dismiss_via_focused_button
    status: active
    description: "Modal UI surface dismiss (Document Overlay, Menu, Settings, Pause) MUST be handled via the surface's root node's _unhandled_input() catching event.is_action_pressed(&\"ui_cancel\"). It MUST NOT be implemented via a focused Close Button widget that the player must click or activate."
    why: "Godot 4.6's dual-focus split (mouse/touch focus separate from keyboard/gamepad focus) makes focused-Button dismiss fragile. The _unhandled_input() + ui_cancel action approach works identically for both input methods (Esc + B/Circle mapped to ui_cancel in InputMap) without requiring any control to hold focus. Simpler, more robust, idiomatic for 4.6."
    adr: docs/architecture/adr-0004-ui-framework.md
    added: 2026-04-19

  - pattern: ui_surface_polls_game_state
    status: active
    description: "UI surfaces MUST subscribe to Events bus signals (per ADR-0002) for state updates. They MUST NOT poll game systems directly (e.g., calling PlayerCharacter.get_health() in _process()) or hold direct references to game system nodes. Health, ammo, alert state, document collection, mission state — all flow through Events.gd."
    why: "Polling couples UI to specific system implementations and creates per-frame work even when state has not changed. Direct system references re-introduce the autoload-singleton-coupling anti-pattern. The Events bus exists precisely to decouple UI from game systems; using it is mandatory."
    adr: docs/architecture/adr-0004-ui-framework.md
    added: 2026-04-19

