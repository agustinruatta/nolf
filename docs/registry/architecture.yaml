#     revised: ""


# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: outline_tier_assignment
    status: active
    pattern: direct_call
    producer: outline-pipeline-system
    consumers:
      - player-character-system
      - stealth-ai-system
      - combat-and-damage-system
      - inventory-and-gadgets-system
      - document-collection-system
      - civilian-ai-system
      - mission-and-level-scripting-system
    adr: docs/architecture/adr-0001-stencil-id-contract.md
    signal_signature: "OutlineTier.set_tier(mesh: MeshInstance3D, tier: int) -> void  # tier ∈ {0=NONE, 1=HEAVIEST, 2=MEDIUM, 3=LIGHT}"
    referenced_by:
      - docs/architecture/adr-0001-stencil-id-contract.md
    added: 2026-04-19
    revised: ""

  - contract: gameplay_event_dispatch
    status: active
    pattern: event_bus
    producer: any-system  # see ADR-0002 for which system publishes which signal
    consumers:
      - audio-system
      - stealth-ai-system
      - combat-and-damage-system
      - inventory-and-gadgets-system
      - document-collection-system
      - mission-and-level-scripting-system
      - failure-and-respawn-system
      - civilian-ai-system
      - dialogue-and-subtitles-system
      - hud-core-system
      - hud-state-signaling-system
      - cutscenes-and-mission-cards-system
      - save-load-system
      - settings-and-accessibility-system
    adr: docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    signal_signature: "36 typed signals declared on Events.gd autoload (subject_verb_past naming, qualified enum types). 2026-04-22 OQ-CD-1 SAI amendment revised 5 signatures: 3 perception signals (alert_state_changed, actor_became_alerted, actor_lost_target) grew a StealthAI.Severity param; takedown_performed grew from (actor, target) to (actor, attacker, StealthAI.TakedownType); player_died payload type renamed CombatSystem.DeathCause → CombatSystemNode.DeathCause. 2026-04-22 4th-pass LS + SAI amendment added 2 new AI/Stealth signals (guard_incapacitated(guard: Node) fires on UNCONSCIOUS or DEAD entry for cross-guard body-tracking-set unregistration; guard_woke_up(guard: Node) fires once when WAKE_UP_SEC timer expires on an UNCONSCIOUS guard — both one-shot per guard per session) AND grew section_entered + section_exited with a LevelStreamingService.TransitionReason 2nd param (FORWARD / RESPAWN / NEW_GAME / LOAD_FROM_SAVE; LevelStreamingService is the sole emitter). Enum-ownership list gained LevelStreamingService.TransitionReason (class_name LevelStreamingService, autoload load-order 4). See ADR-0002 Key Interfaces for the full taxonomy."
    referenced_by:
      - docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    added: 2026-04-19
    revised: 2026-04-22  # OQ-CD-1 SAI amendment bundle (5 signature revisions); 4th-pass LS + SAI amendment bundle (2 new AI/Stealth signals guard_incapacitated + guard_woke_up; LevelStreamingService.TransitionReason 2nd param on section_entered/exited; 34 → 36 signals total)

  - contract: sai_public_accessors
    status: active
    pattern: direct_call
    producer: stealth-ai-system
    consumers:
      - combat-and-damage-system
    adr: docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    signal_signature: |
      # Methods on class StealthAI extends Node — called on specific guard instances.
      # Declared under ADR-0002's `Accessor Conventions (SAI → Combat)` subsection (2026-04-22).
      # Principled exemption from autoload_singleton_coupling: per-instance, read-only,
      # owner-published, stale-safe. NOT invoked via autoload shortcut.
      StealthAI.has_los_to_player() -> bool             # F.1 cache-hit path; 10 Hz stale-safe; no raycast
      StealthAI.takedown_prompt_active(attacker: Node) -> bool  # state ∈ {UNAWARE, SUSPICIOUS} AND rear 180° half-cone AND ≤ 1.5 m AND no LOS; read-only
      # Fence: no new accessors under this convention without an ADR-0002 amendment
      # documenting owner, consumer(s), staleness window, and read-only justification.
    referenced_by:
      - docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    added: 2026-04-22
    revised: ""

  - contract: save_load_service_api
    status: active
    pattern: direct_call
    producer: save-load-service
    consumers:
      - mission-and-level-scripting-system   # calls save_to_slot at section transitions
      - failure-and-respawn-system            # calls load_from_slot on respawn
      - menu-system                           # calls slot_metadata for save card display; load_from_slot from menu
      - player-character-system               # may call save_to_slot on explicit player save action
    adr: docs/architecture/adr-0003-save-format-contract.md
    signal_signature: |
      SaveLoad.save_to_slot(slot: int, save_game: SaveGame) -> bool
      SaveLoad.load_from_slot(slot: int) -> SaveGame  # returns null on failure; caller MUST .duplicate_deep() before live use
      SaveLoad.slot_exists(slot: int) -> bool
      SaveLoad.slot_metadata(slot: int) -> Dictionary  # reads slot_N_meta.cfg sidecar (does NOT load full Resource)
      # Slot range: 0 = autosave; 1-7 = manual saves (8 slots total)
    referenced_by:
      - docs/architecture/adr-0003-save-format-contract.md
    added: 2026-04-19
    revised: ""

  - contract: ui_surface_lifecycle
    status: active
    pattern: direct_call
    producer: ui-framework  # InputContext autoload + FontRegistry static + Theme inheritance chain
    consumers:
      - hud-core-system
      - hud-state-signaling-system
      - document-overlay-ui-system
      - menu-system
      - settings-and-accessibility-system
      - cutscenes-and-mission-cards-system
      - dialogue-and-subtitles-system
      - post-process-stack-system   # called by Document Overlay for sepia dim (enable/disable)
    adr: docs/architecture/adr-0004-ui-framework.md
    signal_signature: |
      # Theme inheritance: each surface theme sets base_theme = preload("project_theme.tres")
      InputContext.push(ctx: InputContext.Context) -> void
      InputContext.pop() -> void
      InputContext.current() -> InputContext.Context
      InputContext.is_active(ctx: InputContext.Context) -> bool
      FontRegistry.hud_numeral(rendered_size_px: int) -> Font  # static; substitutes DIN below 18px floor
      FontRegistry.hud_label() -> Font  # static
      FontRegistry.document_body() -> Font  # static
      FontRegistry.document_header() -> Font  # static
      FontRegistry.menu_title() -> Font  # static
      PostProcessStack.enable_sepia_dim() -> void  # called by Document Overlay open()
      PostProcessStack.disable_sepia_dim() -> void  # called by Document Overlay close()
      # Modal dismiss: _unhandled_input() + event.is_action_pressed(&"ui_cancel")
      # Subtitle suppression: when InputContext.is_active(DOCUMENT_OVERLAY) → suppress ambient VO subtitles
    referenced_by:
      - docs/architecture/adr-0004-ui-framework.md
    added: 2026-04-19
    revised: ""

