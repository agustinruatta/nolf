# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: outline_tier_marker
    status: active
    api: "GPU stencil buffer 8-bit values, reserved 0–3 (0=none, 1=heaviest, 2=medium, 3=light)"
    not: "VisualInstance3D.layers bitmask, vertex color channels, multi-pass discard masking"
    adr: docs/architecture/adr-0001-stencil-id-contract.md
    reason: "Single-pass per-pixel stencil branching is the cheapest runtime cost option that preserves the 3-tier outline weight hierarchy from Art Bible 3.4 / 8C. Visual layers would require N full-screen passes; vertex colors burden the art pipeline; multi-pass discard adds startup cost. Stencil buffer added in Godot 4.5 — HIGH knowledge risk; see ADR Risks section."
    referenced_by:
      - docs/architecture/adr-0001-stencil-id-contract.md
    added: 2026-04-19
    revised: ""

  - purpose: cross_system_event_dispatch
    status: active
    api: "Events autoload (Godot 4.0+ typed signals, callable-based connect, subject_verb_past names, qualified enum-type payloads)"
    not: "direct system-to-system Node references; autoload service-locator coupling; group broadcast (call_group); RefCounted Event objects with pattern-matching"
    adr: docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    reason: "Single-autoload typed-signal hub provides type safety + discoverability + zero coupling between publishers and subscribers. Direct refs are fragile; service-locator is a known Godot anti-pattern; group broadcast loses type safety; Event objects are over-engineered for 32 signals. Per godot-gdscript-specialist: idiomatic for Godot 4.6, no superior 4.5/4.6 mechanism."
    referenced_by:
      - docs/architecture/adr-0002-signal-bus-event-taxonomy.md
    added: 2026-04-19
    revised: ""

  - purpose: persistence_format
    status: active
    api: "Binary Resource (.res) via ResourceSaver.save(save, path, ResourceSaver.FLAG_COMPRESS) and ResourceLoader.load(path); SaveGame extends Resource with @export typed *_State sub-resources; sectional checkpoint scope; refuse-load-on-mismatch versioning via SaveGame.FORMAT_VERSION (in-code const) compared against save_format_version: int (serialized field); atomic write via DirAccess.rename(tmp_path, final_path); 8-slot scheme (slot_0 = autosave, slot_1-7 = manual)"
    not: "JSON via FileAccess; custom binary serialization; ConfigFile for save data (ConfigFile retained ONLY for user://settings.cfg and slot_N_meta.cfg metadata sidecars); NodePath or Node references in saved Resources (use stable actor_id: StringName instead)"
    adr: docs/architecture/adr-0003-save-format-contract.md
    reason: "Resource + @export gives free type safety and editor preview. Binary .res is ~2-3x smaller than .tres and JSON. Sectional scope keeps saves <10 KB and matches NOLF1 player expectations. Refuse-load-on-mismatch is acceptable trade-off for single-shot indie ship (documented Tier 2 risk in ADR-0003). Atomic write prevents corrupt-save-on-crash. duplicate_deep() (4.5+) handles state isolation on load."
    referenced_by:
      - docs/architecture/adr-0003-save-format-contract.md
    added: 2026-04-19
    revised: ""

  - purpose: ui_framework
    status: active
    api: "Single base project_theme.tres + per-surface inherited Themes (Theme.base_theme inheritance). InputContext autoload (push/pop stack: GAMEPLAY, MENU, DOCUMENT_OVERLAY, PAUSE, SETTINGS) for modal input routing. FontRegistry as static class (NOT autoload) with typed getters that substitute DIN 1451 Engschrift below 18 px size floor for Futura Condensed Bold. Modal dismiss via _unhandled_input() + Input.is_action_pressed(&\"ui_cancel\") (Esc + B/Circle in InputMap). Document Overlay sepia dim via PostProcessStack.enable_sepia_dim() / disable_sepia_dim() lifecycle calls. Subtitle suppression rule: when InputContext.is_active(DOCUMENT_OVERLAY) → ambient VO subtitles suppressed."
    not: "Multiple independent Themes per surface (drift risk); FontRegistry as autoload (anti-pattern boundary); modal dismiss via focused Button widget (4.6 dual-focus complexity); UI-owned sepia dim shader (separation of concerns: Post-Process Stack owns shaders); UI surfaces emitting their own signals (use Events.gd from ADR-0002); UI surfaces polling game state (use Events bus subscriptions)"
    adr: docs/architecture/adr-0004-ui-framework.md
    reason: "Theme inheritance prevents Art Bible 7 typography/color drift across 7 UI surfaces. FontRegistry static class avoids the autoload-singleton-coupling anti-pattern boundary that an autoload version would straddle. InputContext as autoload is justified by the same principled distinction as SaveLoadService (ADR-0003): owns the input-routing domain, fenced from service-locator drift. Modal dismiss via _unhandled_input() sidesteps Godot 4.6's dual-focus mouse/keyboard split entirely. Document Overlay dim delegated to Post-Process Stack preserves separation of concerns."
    referenced_by:
      - docs/architecture/adr-0004-ui-framework.md
    added: 2026-04-19
    revised: ""

  - purpose: autoload_registration_order
    status: active
    api: "Single canonical [autoload] block line order declared in ADR-0007 §Key Interfaces (amended 2026-04-23): Events (1) → EventLogger (2) → SaveLoad (3) → InputContext (4) → LevelStreamingService (5) → PostProcessStack (6) → Combat (7). All entries use the `*res://` path-prefix-star scene-mode syntax (Node added to root at startup; _ready() fires; tree lifecycle active). project.godot [autoload] block is generated from ADR-0007 verbatim. Downstream ADRs and GDDs reference ADR-0007 for order; they MUST NOT restate specific line numbers. Cross-autoload reference safety rule: an autoload's _ready() may reference any earlier autoload by name (N-1..1 are all in the tree by the time N._ready() fires); it MUST NOT reference a later autoload; no autoload's _init() may reference any other autoload (not yet in tree at construction)."
    not: "Scattered 'load order N' statements across ADRs/GDDs; non-deterministic registration via @tool scripts calling add_autoload_singleton() / ProjectSettings.set_setting(); runtime Engine.register_singleton() from game code; cross-autoload references in _init(); references to later-listed autoloads from earlier autoloads' _ready(); script-mode autoloads (no `*` prefix) for Node-subclass autoloads."
    adr: docs/architecture/adr-0007-autoload-load-order-registry.md
    reason: "The engine only honours line order within the project.godot [autoload] block; 'load order N' labels anywhere else are team-documentation and drift-prone. A dedicated registry ADR prevents recurrence of the 2026-04-22 InputContext vs LevelStreamingService load-order-4 collision and pins PostProcessStack's previously unstated position. Cross-autoload reference safety was previously implicit developer knowledge; ADR-0007 makes it authoritative. godot-specialist validation 2026-04-22 §1 + 2026-04-23 Claims 1/2/3 GREEN/YELLOW/YELLOW (framing corrections for Claim 2 incorporated; all three hazards from Claim 3 fenced by forbidden patterns below). Amended 2026-04-23 to add Combat at line 7 (Path A per godot-specialist 2026-04-23) — closes Phase 5 §6.3 cross-session editorial conflict against ADR-0002 OQ-CD-1 bundle + combat-damage.md §350 (TR-CD-022)."
    referenced_by:
      - docs/architecture/adr-0007-autoload-load-order-registry.md
      - docs/architecture/adr-0002-signal-bus-event-taxonomy.md
      - docs/architecture/adr-0003-save-format-contract.md
      - docs/architecture/adr-0004-ui-framework.md
      - design/gdd/signal-bus.md
      - design/gdd/level-streaming.md
      - design/gdd/post-process-stack.md
      - design/gdd/combat-damage.md
    added: 2026-04-23
    revised: 2026-04-23

  - purpose: performance_budget_enforcement
    status: active
    api: "Per-slot caps enforced at CI time against a single reference scene (`tests/reference_scenes/restaurant_dense_interior.tscn`) via the `/perf-profile` skill. GitHub Actions `perf-gate` job fails build on (a) total p99 > 16.6 ms, (b) any slot exceeds its Iris Xe cap at p95, or (c) post-stream warm-up exceeds 3 frames on Windows/D3D12. Per-story gates: each ticking-system story embeds its ADR-0008 slot reference in Acceptance Criteria."
    not: "Runtime BudgetRegistry autoload (would be instrumentation drift + new autoload requiring ADR-0007 amendment); per-system ad-hoc benchmarks (duplicated effort + no cross-system sum verification); dynamic resolution scaling / LOD degradation (Iris Xe at 0.75 scale is fixed at startup per ADR-0001 / TR-PP-008); runtime FPS dashboard visible to player (period authenticity pillar forbids modern UX conveniences)."
    adr: docs/architecture/adr-0008-performance-budget-distribution.md
    reason: "Single reference scene + single command + single pass/fail threshold makes enforcement testable on every PR. Per-story embedding lets /create-stories + /story-done check budget conformance at story authoring and completion time. Iris Xe numbers are the binding cap; RTX 2060 measurements are informative only. No runtime instrumentation means zero runtime cost for the enforcement mechanism itself."
    referenced_by:
      - docs/architecture/adr-0008-performance-budget-distribution.md
    added: 2026-04-23
    revised: ""

