    added: 2026-04-19
    revised: ""

  # ── Noise radii (read by Stealth AI for AI perception — CRITICAL cross-system contract) ──
  - name: player_noise_walk
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 5.0
    unit: m
    added: 2026-04-19
    revised: ""
  - name: player_noise_sprint
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 9.0
    unit: m
    added: 2026-04-19
    revised: ""
  - name: player_noise_crouch
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 3.0
    unit: m
    added: 2026-04-19
    revised: ""
  - name: player_noise_crouch_sprint
    status: deprecated
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 9.0
    unit: m
    notes: "DEPRECATED 2026-04-20 (orphan cleanup): CrouchSprint state was cut entirely in Session A (2026-04-19) per review item R-4 — strictly slower than Walk and with the same noise as Sprint, it served no tactical niche. Entry retained for audit trail only; do NOT reference in new GDDs."
    added: 2026-04-19
    revised: "2026-04-20"
  - name: player_noise_jump_takeoff
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 4.0
    unit: m
    notes: "Discrete spike. Latched as NoiseEvent{type=JUMP_TAKEOFF, radius_m=4.0, origin=<position at takeoff>}; auto-expires after spike_latch_duration_sec (default 0.1 s = 6 frames @ 60 Hz = one AI tick window at 10 Hz). Session E-Prime AI-1 / R-17: latch is idempotent-read (every guard within the window sees the same event; auto-expiry is sole clear); duration parameterized in seconds for physics-tick-rate independence. Session E-Prime SD-2: radius is multiplied by noise_global_multiplier at get_noise_level() return."
    added: 2026-04-19
    revised: "2026-04-20"
  - name: player_noise_hard_landing
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 8.0
    unit: m
    notes: "Discrete spike. Triggered when |velocity.y| > v_land_hard, where v_land_hard = sqrt(2 * player_gravity * player_hard_land_height) — runtime-derived per F.3. Binary at MVP (see OQ-7). Latched as NoiseEvent{type=LANDING_HARD, radius_m=8.0, origin=<landing site>}; auto-expires after spike_latch_duration_sec (default 0.1 s). Session E-Prime AI-1 / R-17: idempotent-read, physics-tick-rate-independent. Session E-Prime SD-2: radius is multiplied by noise_global_multiplier at get_noise_level() return."
    added: 2026-04-19
    revised: "2026-04-20"
  - name: player_noise_landing_soft
    status: active
    source: design/gdd/player-character.md
    referenced_by:
      - design/gdd/player-character.md
    value: 5.0
    unit: m
    notes: "Discrete spike. Triggered on landing when |velocity.y| ≤ v_land_hard (i.e., any landing below the hard threshold). Latched as NoiseEvent{type=LANDING_SOFT, radius_m=5.0, origin=<landing site>}; auto-expires after spike_latch_duration_sec. Implicit in prior versions via the noise table; registered explicitly in Session D so Combat & Damage + Stealth AI consume a single source of truth. Session E-Prime AI-1 / R-17 / SD-2: idempotent-read, physics-tick-rate-independent, multiplied by noise_global_multiplier."
    added: 2026-04-20
    revised: "2026-04-20"

