# Technical Requirement ID Registry
#
# PURPOSE: Persistent, stable IDs for every GDD technical requirement.
# Prevents TR-ID renumbering across /architecture-review runs, which would
# break story references.
#
# RULES:
#   - IDs are PERMANENT. Never renumber, never delete (use status: deprecated).
#   - Add new entries only at the END of each system's list.
#   - When a GDD requirement is reworded (same intent): update `requirement`
#     text and add a `revised` date. The ID stays the same.
#   - When a requirement is removed from the GDD: set status: deprecated.
#   - When a requirement is split or replaced: set status: superseded-by with
#     the new TR-ID(s).
#
# WRITTEN BY: /architecture-review (appends new entries, never overwrites)
# READ BY:    /create-stories (embed IDs in stories)
#             /story-done (look up current requirement text at review time)
#             /story-readiness (validate TR-ID exists and is active)
#
# ID FORMAT: TR-[system-slug]-[NNN]
#   system-slug: short slug matching the GDD system name
#     SB  = Signal Bus           INP = Input              AUD = Audio
#     OUT = Outline Pipeline     PP  = Post-Process       SAV = Save/Load
#     LOC = Localization         PC  = Player Character   FC  = FootstepComponent
#     LS  = Level Streaming      SAI = Stealth AI         CD  = Combat & Damage
#   NNN = three-digit zero-padded sequence per system, starting at 001
#
# STATUS VALUES: active | deprecated | superseded-by: TR-[system]-NNN

version: 2
last_updated: "2026-04-23"

requirements:
  # ─── Signal Bus (SB) ──────────────────────────────────────────────────────
  - id: TR-SB-001
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "Signal Bus is the single cross-system event dispatch point; all gameplay events go through Events.gd autoload."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SB-002
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "36 typed signals across 9 gameplay domains + Persistence + Settings (taxonomy locked in ADR-0002; 4th-pass LS + SAI amendment landed 2026-04-22 grew count 34 → 36)."
    created: 2026-04-22
    revised: 2026-04-23
    status: active
  - id: TR-SB-003
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "Autoload order: Events=1, EventLogger=2 (project.godot [autoload] line order is authoritative per specialist §1)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SB-004
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "Events.gd contains ONLY signal declarations — no func/var/const/enum bodies (forbidden pattern)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SB-005
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "Subscribers connect in _ready() and disconnect with is_connected guard in _exit_tree() (lifecycle rule)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SB-006
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "Subscribers MUST call is_instance_valid(node) on Node-typed payloads before dereference."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SB-007
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "Enum types used in signal payloads are defined on the owning system class (StealthAI.AlertState, CombatSystemNode.DamageType, etc.) — never on Events.gd."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SB-008
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "Forbidden patterns enforced: autoload_singleton_coupling, wrapper_emit_methods, synchronous_request_response_through_bus, events_with_state_or_methods, engine_signal_reemission."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SB-009
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "EventLogger debug autoload self-removes in non-debug builds via OS.is_debug_build()."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SB-010
    system: signal-bus
    gdd: design/gdd/signal-bus.md
    requirement: "SAI→Combat read accessors (has_los_to_player, takedown_prompt_active) are the sole sanctioned carve-out from autoload_singleton_coupling (Accessor Conventions subsection)."
    created: 2026-04-22
    revised: ""
    status: active

  # ─── Input (INP) ──────────────────────────────────────────────────────────
  - id: TR-INP-001
    system: input
    gdd: design/gdd/input.md
    requirement: "All cross-system input reads go through named actions in InputMap; raw KEY_* constants forbidden (except in debug gated by OS.is_debug_build())."
