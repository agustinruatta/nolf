    revised: ""
    status: active
  - id: TR-PP-007
    system: post-process-stack
    gdd: design/gdd/post-process-stack.md
    requirement: "PostProcessStack autoload owns sepia dim state and exposes enable_sepia_dim()/disable_sepia_dim() public API."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-PP-008
    system: post-process-stack
    gdd: design/gdd/post-process-stack.md
    requirement: "Resolution scale applied via Viewport.scaling_3d_scale; persisted in user://settings.cfg per ADR-0003; runtime apply via setting_changed signal."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-PP-009
    system: post-process-stack
    gdd: design/gdd/post-process-stack.md
    requirement: "Performance budget: sepia pass ≤0.5 ms at 1080p RTX 2060; full chain ≤2.5 ms on Iris Xe at 0.75 scale."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-PP-010
    system: post-process-stack
    gdd: design/gdd/post-process-stack.md
    requirement: "Only Settings & Accessibility writes resolution_scale; PostProcessStack reads via setting_changed signal (anti-pattern enforced)."
    created: 2026-04-22
    revised: ""
    status: active

  # ─── Save / Load (SAV) ────────────────────────────────────────────────────
  - id: TR-SAV-001
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Save format: binary .res with ResourceSaver.FLAG_COMPRESS per ADR-0003; sectional scope (NOLF1-style)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-002
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "SaveGame extends Resource holds typed per-system state Resources (player, inventory, stealth_ai, civilian_ai, documents, mission)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-003
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "SaveLoadService autoload writes/reads only; does NOT query game systems to assemble SaveGame (caller-assembly pattern, forbidden pattern: save_service_assembles_state)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-004
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Eight save slots: slot 0 = autosave (overwritten on manual save + section entry), slots 1-7 = player-controlled manual."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-005
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Atomic write: tmp file → DirAccess.rename() → metadata sidecar → optional screenshot; previous good save never destroyed on failure."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-006
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Resource.duplicate_deep() (Godot 4.5+) MANDATORY on load before handing state to live systems (forbidden pattern: forgotten_duplicate_deep_on_load)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-007
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Per-actor identity uses stable actor_id: StringName (NOT NodePath); survives scene reloads; unguarded default state on missing key."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-008
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Versioning: refuse-load-on-mismatch (save_format_version compare against FORMAT_VERSION const); no migration path at MVP."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-009
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Metadata sidecar slot_N_meta.cfg (ConfigFile) read-only by Menu (avoids full .res load); fields: section_id, saved_at_iso8601, elapsed_time, screenshot_path, save_format_version."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-010
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Settings persisted in separate user://settings.cfg ConfigFile, NEVER in SaveGame; prevents settings loss on new-game."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-011
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Three Persistence signals: game_saved(slot, section_id), game_loaded(slot), save_failed(reason: SaveLoad.FailureReason)."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-012
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Type-guard after every load: `if loaded == null or not (loaded is SaveGame): emit save_failed(CORRUPT_FILE)` — binary .res returns null silently on class mismatch."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-013
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Performance budget: ≤10 ms save latency, ≤2 ms I/O load (hidden in Level Streaming cost); <100 KB per SaveGame post-duplicate_deep."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-014
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Quicksave F5 writes slot 0 non-blocking; Quickload F9 reads slot 0 or shows 'No quicksave available' toast."
    created: 2026-04-22
    revised: ""
    status: active
  - id: TR-SAV-015
    system: save-load
    gdd: design/gdd/save-load.md
    requirement: "Saves blocked during InputContext.CUTSCENE; permitted during active combat (guard state at save time is what loads)."
    created: 2026-04-22
    revised: ""
    status: active

