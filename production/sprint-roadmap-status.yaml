  - "Scope drift flagged by /scope-check"
  - "Visual sign-off needed (screenshot diff, contrast playtest)"
  - "Art asset surfaces as hard blocker (.glb mesh, animation rig, VO line, final texture)"
  - "ADR-0004 status requires action (Sprint 06 close)"
  - "Test failure or regression — never patch by skipping tests"
  - "Cross-sprint dependency invalidates a planned sprint"
